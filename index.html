<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#04040A">
<title>Form — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════ */
:root {
  --ink:   #04040A;
  --ink2:  #0A0A14;
  --card:  #0F0F1C;
  --card2: #151525;
  --card3: #1C1C2E;
  --rim:   rgba(255,255,255,0.055);
  --rim2:  rgba(255,255,255,0.10);

  --snow:  #FFFFFF;
  --fog:   rgba(255,255,255,0.52);
  --mist:  rgba(255,255,255,0.24);
  --ghost: rgba(255,255,255,0.10);

  /* Accent palette — one per day + brand */
  --brand: #E8FF47;          /* electric lime — brand */
  --d1:    #FF3C5C;          /* crimson  — Day 1 */
  --d1d:   rgba(255,60,92,0.12);
  --d2:    #00E5A0;          /* mint     — Day 2 */
  --d2d:   rgba(0,229,160,0.10);
  --d3:    #3D9EFF;          /* sky      — Day 3 */
  --d3d:   rgba(61,158,255,0.10);

  --gold:  #FFB830;
  --goldd: rgba(255,184,48,0.10);

  --r24: 24px;
  --r18: 18px;
  --r12: 12px;
  --r8:  8px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; background:var(--ink); color:var(--snow); font-family:'Sora',sans-serif; -webkit-font-smoothing:antialiased; }
#app { height:100%; display:flex; flex-direction:column; max-width:430px; margin:0 auto; position:relative; }
a { text-decoration:none; color:inherit; }
button { font-family:inherit; border:none; background:none; cursor:pointer; }
* { -webkit-tap-highlight-color:transparent; }

/* ── SCROLL ── */
.body { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding-bottom:92px; }
.body::-webkit-scrollbar { display:none; }

/* ══════════════════════════════════════════
   TOP CHROME
══════════════════════════════════════════ */
.chrome {
  padding: 52px 20px 0;
  background: linear-gradient(180deg, var(--ink2) 55%, transparent);
  position: sticky; top:0; z-index:60;
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
}

/* wordmark */
.wordmark { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.wm-badge {
  width:32px; height:32px; border-radius:9px;
  background:var(--brand); display:flex; align-items:center; justify-content:center;
  box-shadow: 0 0 0 1px rgba(232,255,71,0.3), 0 6px 18px rgba(232,255,71,0.25);
}
.wm-badge svg { width:18px; height:18px; }
.wm-text { font-size:16px; font-weight:800; letter-spacing:-0.3px; }
.wm-text span { color:var(--brand); }

/* ring row */
.ring-row { display:flex; gap:7px; margin-bottom:14px; }
.ring-tile {
  flex:1; background:var(--card); border:1px solid var(--rim);
  border-radius:var(--r18); padding:11px 10px;
  display:flex; align-items:center; gap:8px;
  cursor:pointer; transition:border-color .2s;
}
.ring-tile.sel { border-color:var(--rim2); }
.ring-svg-wrap { position:relative; width:36px; height:36px; flex-shrink:0; }
.ring-svg-wrap svg { width:36px; height:36px; transform:rotate(-90deg); }
.ring-svg-wrap circle { fill:none; stroke-width:3.5; stroke-linecap:round; }
.ring-bg { opacity:.14; }
.ring-arc { transition: stroke-dashoffset .7s cubic-bezier(.4,0,.2,1); }
.ring-inner-icon {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
}
.ring-inner-icon svg { width:12px; height:12px; }
.ring-meta { min-width:0; }
.ring-num { font-size:15px; font-weight:800; letter-spacing:-0.4px; line-height:1; }
.ring-lbl { font-size:9px; font-weight:700; color:var(--mist); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

/* tab strip */
.tab-strip { display:flex; gap:5px; padding-bottom:12px; }
.tab-pill {
  flex:1; padding:8px 4px; border-radius:10px;
  font-size:11px; font-weight:700; letter-spacing:0.2px; color:var(--mist);
  background:var(--card); border:1px solid var(--rim);
  transition:all .18s;
}
.tab-pill.t-active { color:var(--snow); background:var(--card3); border-color:var(--rim2); }
.tab-pill.t-d1 { color:var(--d1); background:var(--d1d); border-color:rgba(255,60,92,.25); }
.tab-pill.t-d2 { color:var(--d2); background:var(--d2d); border-color:rgba(0,229,160,.25); }
.tab-pill.t-d3 { color:var(--d3); background:var(--d3d); border-color:rgba(61,158,255,.25); }

/* ══════════════════════════════════════════
   OVERVIEW PAGE
══════════════════════════════════════════ */
.ov-hero { padding:22px 20px 4px; }
.ov-hero-label { font-size:11px; font-weight:700; color:var(--mist); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:8px; }
.ov-hero-title { font-size:32px; font-weight:800; letter-spacing:-1.2px; line-height:1.05; }
.ov-hero-title em { font-style:normal; color:var(--brand); }
.ov-hero-sub { font-size:13px; color:var(--fog); margin-top:8px; line-height:1.6; font-weight:400; }

.ov-stats { display:flex; gap:8px; padding:18px 20px 4px; }
.ov-stat { flex:1; background:var(--card); border:1px solid var(--rim); border-radius:var(--r18); padding:14px 12px; }
.ov-stat-val { font-size:26px; font-weight:800; letter-spacing:-1px; line-height:1; }
.ov-stat-lbl { font-size:10px; font-weight:700; color:var(--mist); letter-spacing:.8px; text-transform:uppercase; margin-top:4px; }

.sec-lbl { font-size:11px; font-weight:700; color:var(--mist); letter-spacing:1.2px; text-transform:uppercase; padding:18px 20px 10px; }

/* program overview video */
.ov-video-wrap { margin:0 20px 4px; }
.ov-yt-card {
  display:block; background:var(--card); border:1px solid var(--rim);
  border-radius:var(--r24); overflow:hidden; cursor:pointer;
  transition:border-color .2s;
}
.ov-yt-card:active { opacity:.88; }
.ov-yt-thumb { position:relative; aspect-ratio:16/9; background:#000; overflow:hidden; }
.ov-yt-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.ov-yt-grad { position:absolute; inset:0; background:linear-gradient(to top,rgba(4,4,10,.9) 0%,transparent 55%); display:flex; align-items:center; justify-content:center; }
.ov-yt-play { width:54px; height:54px; background:rgba(255,255,255,.96); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 28px rgba(0,0,0,.55); }
.ov-yt-play svg { width:20px; height:20px; fill:#ff0000; margin-left:3px; }
.ov-yt-foot { padding:13px 16px; display:flex; align-items:center; justify-content:space-between; }
.ov-yt-title { font-size:13px; font-weight:700; }
.ov-yt-cta { font-size:11px; font-weight:700; color:var(--brand); display:flex; align-items:center; gap:4px; }

/* day schedule cards */
.day-card {
  margin:0 20px 10px;
  background:var(--card); border:1px solid var(--rim);
  border-radius:var(--r24); padding:16px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:border-color .18s, transform .15s;
}
.day-card:active { transform:scale(.985); }
.day-card.is-done { border-color:rgba(0,229,160,.22); }
.dc-icon { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.dc-icon svg { width:22px; height:22px; }
.dc-body { flex:1; min-width:0; }
.dc-day-label { font-size:10px; font-weight:700; color:var(--mist); letter-spacing:.8px; text-transform:uppercase; margin-bottom:3px; }
.dc-title { font-size:14px; font-weight:800; letter-spacing:-.2px; }
.dc-meta { font-size:11px; color:var(--fog); margin-top:2px; }
.dc-bar-track { height:3px; background:var(--card3); border-radius:2px; margin-top:9px; overflow:hidden; }
.dc-bar-fill { height:100%; border-radius:2px; transition:width .4s ease; }
.dc-right { text-align:right; flex-shrink:0; }
.dc-pct { font-size:18px; font-weight:800; letter-spacing:-.5px; }
.dc-chevron { font-size:14px; color:var(--mist); margin-top:2px; }

/* ══════════════════════════════════════════
   DAY PAGE
══════════════════════════════════════════ */
.day-page-hero { padding:20px 20px 16px; }
.day-page-eyebrow { font-size:11px; font-weight:700; color:var(--mist); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.day-page-title { font-size:30px; font-weight:800; letter-spacing:-1.1px; line-height:1; }
.day-page-sub { font-size:13px; color:var(--fog); margin-top:5px; font-weight:400; }
.day-page-prog { height:4px; background:var(--card3); border-radius:2px; margin-top:14px; overflow:hidden; }
.day-page-fill { height:100%; border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }

/* ══════════════════════════════════════════
   SESSION CARD
══════════════════════════════════════════ */
.sess-card {
  margin:0 20px 12px;
  background:var(--card); border:1px solid var(--rim);
  border-radius:var(--r24); overflow:hidden;
}
.sess-hdr {
  padding:14px 16px; display:flex; align-items:center;
  gap:12px; cursor:pointer; transition:background .15s;
}
.sess-hdr:active { background:var(--card2); }
.sess-icon {
  width:40px; height:40px; border-radius:12px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.sess-icon svg { width:20px; height:20px; }
.sess-meta { flex:1; min-width:0; }
.sess-eyebrow { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
.sess-name { font-size:14px; font-weight:800; letter-spacing:-.2px; }
.sess-tags { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
.sess-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:6px; background:var(--card3); color:var(--mist); }
.sess-tag-done { color:var(--d2); }
.sess-chevron {
  width:26px; height:26px; border-radius:50%; background:var(--card3);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:transform .25s, background .2s;
}
.sess-chevron svg { width:12px; height:12px; fill:none; stroke:var(--fog); stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:transform .25s; }
.sess-chevron.open { background:var(--card2); }
.sess-chevron.open svg { transform:rotate(180deg); }

/* embed */
.sess-embed { padding:0 14px 14px; }
.embed-shell { border-radius:var(--r12); overflow:hidden; aspect-ratio:16/9; background:#000; }
.embed-shell iframe { width:100%; height:100%; border:none; display:block; }

/* exercise list */
.ex-block { padding:0 14px 10px; }
.ex-block-lbl { font-size:10px; font-weight:700; color:var(--mist); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; padding:0 2px; }
.ex-row {
  display:flex; align-items:flex-start; gap:10px;
  padding:12px 12px; border-radius:var(--r12);
  background:var(--card2); border:1px solid var(--rim);
  margin-bottom:6px; cursor:pointer;
  transition:background .15s, border-color .15s;
  -webkit-user-select:none; user-select:none;
}
.ex-row.ck { background:rgba(0,229,160,0.06); border-color:rgba(0,229,160,0.18); }
.ex-cb {
  width:20px; height:20px; border-radius:6px;
  border:1.5px solid rgba(255,255,255,0.2);
  flex-shrink:0; margin-top:1px;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.ex-row.ck .ex-cb { background:var(--d2); border-color:var(--d2); }
.ex-cb-icon { display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; }
.ex-cb-icon svg { width:11px; height:11px; }
.ex-row.ck .ex-cb-icon { opacity:1; }
.ex-right { flex:1; min-width:0; }
.ex-name { font-size:13px; font-weight:700; line-height:1.3; transition:color .15s; }
.ex-row.ck .ex-name { color:var(--mist); text-decoration:line-through; text-decoration-color:rgba(255,255,255,0.18); }
.ex-detail { font-size:11px; color:var(--mist); margin-top:2px; font-weight:500; }

/* timestamps */
.ts-list { display:flex; flex-wrap:wrap; gap:5px; margin-top:7px; }
.ts-chip {
  display:inline-flex; align-items:center; gap:5px;
  font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500;
  color:var(--d3); background:var(--d3d); border:1px solid rgba(61,158,255,0.2);
  border-radius:7px; padding:4px 8px; cursor:pointer;
  transition:background .15s; -webkit-user-select:none; user-select:none;
}
.ts-chip:active { background:rgba(61,158,255,.22); }
.ts-chip svg { width:9px; height:9px; fill:var(--d3); flex-shrink:0; }
.ts-chip-lbl { font-family:'Sora',sans-serif; font-size:9px; font-weight:600; color:var(--mist); margin-left:1px; }

/* ══════════════════════════════════════════
   RECOVERY CARD
══════════════════════════════════════════ */
.rec-card {
  margin:0 20px 12px;
  background:linear-gradient(140deg, rgba(0,229,160,0.05), rgba(61,158,255,0.04));
  border:1px solid rgba(0,229,160,0.14);
  border-radius:var(--r24); padding:16px;
}
.rec-hdr { display:flex; align-items:center; gap:9px; margin-bottom:14px; }
.rec-hdr-icon { width:32px; height:32px; border-radius:10px; background:rgba(0,229,160,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.rec-hdr-icon svg { width:17px; height:17px; }
.rec-hdr-text { font-size:13px; font-weight:800; color:var(--d2); }
.rec-row {
  display:flex; align-items:center; gap:10px; margin-bottom:9px;
  cursor:pointer; -webkit-user-select:none; user-select:none;
}
.rec-row:last-child { margin-bottom:0; }
.rec-cb {
  width:18px; height:18px; border-radius:5px;
  border:1.5px solid rgba(0,229,160,0.3);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.rec-row.ck .rec-cb { background:var(--d2); border-color:var(--d2); }
.rec-cb-icon { opacity:0; transition:opacity .15s; display:flex; }
.rec-cb-icon svg { width:10px; height:10px; }
.rec-row.ck .rec-cb-icon { opacity:1; }
.rec-txt { font-size:12px; color:var(--fog); font-weight:500; flex:1; line-height:1.4; transition:color .15s; }
.rec-row.ck .rec-txt { color:var(--mist); text-decoration:line-through; text-decoration-color:rgba(255,255,255,0.15); }
.rec-badge { font-size:10px; font-weight:700; color:var(--d2); background:var(--d2d); border-radius:6px; padding:3px 7px; flex-shrink:0; }

/* ══════════════════════════════════════════
   COMPLETE BUTTON
══════════════════════════════════════════ */
.cta-wrap { padding:6px 20px 2px; }
.cta-btn {
  width:100%; padding:16px; border-radius:var(--r18);
  font-size:14px; font-weight:800; letter-spacing:0.2px; color:#04040A;
  background:var(--brand); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:9px;
  transition:opacity .2s, transform .15s;
  box-shadow: 0 4px 22px rgba(232,255,71,0.22);
}
.cta-btn:active { opacity:.82; transform:scale(.985); }
.cta-btn.done { background:var(--d2d); color:var(--d2); border:1px solid rgba(0,229,160,0.25); box-shadow:none; }
.cta-btn svg { width:16px; height:16px; }

/* ══════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════ */
.nav {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(4,4,10,0.88);
  backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--rim);
  display:flex; padding:10px 0 28px; z-index:80;
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:2px 0; cursor:pointer; color:var(--ghost);
  transition:color .2s;
}
.nav-item.on { color:var(--snow); }
.nav-item.on-d1 { color:var(--d1); }
.nav-item.on-d2 { color:var(--d2); }
.nav-item.on-d3 { color:var(--d3); }
.nav-item-icon { width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
.nav-item-icon svg { width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
.nav-item-lbl { font-size:10px; font-weight:700; letter-spacing:.4px; }
.nav-pip { width:4px; height:4px; border-radius:50%; background:currentColor; opacity:0; transition:opacity .2s; }
.nav-item.on .nav-pip, .nav-item.on-d1 .nav-pip, .nav-item.on-d2 .nav-pip, .nav-item.on-d3 .nav-pip { opacity:1; }

/* ══════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════ */
@keyframes up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.u1 { animation: up .3s cubic-bezier(.4,0,.2,1) both; }
.u2 { animation: up .3s .06s cubic-bezier(.4,0,.2,1) both; }
.u3 { animation: up .3s .12s cubic-bezier(.4,0,.2,1) both; }
.u4 { animation: up .3s .18s cubic-bezier(.4,0,.2,1) both; }
.u5 { animation: up .3s .24s cubic-bezier(.4,0,.2,1) both; }

.spc { height:10px; }
</style>
</head>
<body>
<div id="app">
  <div class="body" id="body"></div>
  <nav class="nav" id="nav"></nav>
</div>

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function pad(n){return String(n).padStart(2,'0');}
function fmt(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+':'+pad(m)+':'+pad(sc):pad(m)+':'+pad(sc);}
function ytUrl(v,t){return 'https://www.youtube.com/watch?v='+v+(t?'&t='+t+'s':'');}
function thumb(v){return 'https://img.youtube.com/vi/'+v+'/hqdefault.jpg';}
function dayProg(day){
  var t=0,d=0;
  day.sections.forEach(function(s){(s.exercises||s.items||[]).forEach(function(e){t++;if(S.done[e.id])d++;});});
  return {total:t,done:d,pct:t>0?Math.round(d/t*100):0};
}
function weekProg(){var t=0,d=0;DAYS.forEach(function(day){var p=dayProg(day);t+=p.total;d+=p.done;});return{total:t,done:d,pct:t>0?Math.round(d/t*100):0};}
function doneCount(){return DAYS.filter(function(d){var p=dayProg(d);return p.done===p.total&&p.total>0;}).length;}
function ringCirc(){return 2*Math.PI*14;}

/* ══════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════ */
function setTab(t){S.tab=t;saveS();document.getElementById('body').scrollTop=0;render();}
function toggleSection(id){S.open[id]=!S.open[id];saveS();render();}
function toggleItem(id){
  S.done[id]=!S.done[id];saveS();
  patchItem(id);patchProgress();
}
function completeDay(dayId){
  var day=DAYS.find(function(d){return d.id===dayId;});
  if(!day)return;
  var p=dayProg(day),mark=p.done<p.total;
  day.sections.forEach(function(s){(s.exercises||s.items||[]).forEach(function(e){S.done[e.id]=mark;});});
  saveS();render();
}

function patchItem(id){
  var el=document.getElementById('i-'+id);
  if(!el)return;
  var done=!!S.done[id];
  var isRec=el.classList.contains('rec-row');
  if(isRec){
    el.className='rec-row'+(done?' ck':'');
    var ti=el.querySelector('.rec-cb-icon');if(ti)ti.style.opacity=done?'1':'0';
    var tx=el.querySelector('.rec-txt');if(tx)tx.style.textDecoration=done?'line-through':'';
  } else {
    el.className='ex-row'+(done?' ck':'');
    var ti2=el.querySelector('.ex-cb-icon');if(ti2)ti2.style.opacity=done?'1':'0';
    var nm=el.querySelector('.ex-name');if(nm)nm.style.textDecoration=done?'line-through':'';
  }
}
function patchProgress(){
  var C=ringCirc();
  DAYS.forEach(function(d){
    var p=dayProg(d);
    var arc=document.getElementById('arc-'+d.id);
    if(arc){arc.style.strokeDasharray=C;arc.style.strokeDashoffset=C*(1-p.pct/100);}
    var rn=document.getElementById('rnum-'+d.id);if(rn)rn.textContent=p.pct+'%';
    var bp=document.getElementById('bp-'+d.id);if(bp)bp.style.width=p.pct+'%';
    var dc=document.getElementById('dc-'+d.id);
    if(dc){var isDone=p.done===p.total&&p.total>0;dc.className='day-card'+(isDone?' is-done':'');}
    var dpct=document.getElementById('dpct-'+d.id);if(dpct)dpct.textContent=p.pct+'%';
  });
  var wp=weekProg();
  var warc=document.getElementById('arc-week');
  if(warc){warc.style.strokeDasharray=C;warc.style.strokeDashoffset=C*(1-wp.pct/100);}
  var wrn=document.getElementById('rnum-week');if(wrn)wrn.textContent=wp.pct+'%';
  var pfill=document.getElementById('day-prog-fill');if(pfill){var day=DAYS.find(function(d){return d.id===S.tab;});if(day)pfill.style.width=dayProg(day).pct+'%';}
  var btn=document.getElementById('cta');
  if(btn){var day2=DAYS.find(function(d){return d.id===S.tab;});if(day2){var p2=dayProg(day2);btn.className='cta-btn'+(p2.pct===100?' done':'');btn.innerHTML=ctaBtnHTML(p2.pct===100);}}
  var dc2=document.getElementById('days-done');if(dc2)dc2.textContent=doneCount()+'/3 days done';
}

/* ── CHROME ── */
function buildChrome(){
  var C=ringCirc();
  var wp=weekProg();
  function ring(id,clr,iconKey,label){
    var p=id==='week'?wp:dayProg(DAYS.find(function(d){return d.id===id;}));
    var pct=p?p.pct:0;
    var offset=C*(1-pct/100);
    var tabId=id==='week'?'overview':id;
    var isSel=(S.tab===tabId)||(S.tab===id);
    return '<div class="ring-tile'+(isSel?' sel':'')+'" onclick="setTab(\''+tabId+'\')">' +
      '<div class="ring-svg-wrap">' +
        '<svg viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="14" stroke="'+clr+'" stroke-width="3.5"/>' +
        '<circle class="ring-arc" id="arc-'+id+'" cx="18" cy="18" r="14" stroke="'+clr+'" stroke-width="3.5" stroke-dasharray="'+C.toFixed(2)+'" stroke-dashoffset="'+offset.toFixed(2)+'" stroke-linecap="round"/></svg>' +
        '<div class="ring-inner-icon" style="color:'+clr+'">'+svgIcon(iconKey)+'</div>' +
      '</div>' +
      '<div class="ring-meta"><div class="ring-num" style="color:'+clr+'" id="rnum-'+id+'">'+pct+'%</div><div class="ring-lbl">'+label+'</div></div>' +
    '</div>';
  }
  var tabs=[{id:'overview',label:'Plan'},{id:'day1',label:'Day 1'},{id:'day2',label:'Day 2'},{id:'day3',label:'Day 3'}];
  var tabHTML=tabs.map(function(t){
    var cls='tab-pill';
    if(S.tab===t.id) cls+=(t.id==='day1'?' t-d1':t.id==='day2'?' t-d2':t.id==='day3'?' t-d3':' t-active');
    return '<button class="'+cls+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</button>';
  }).join('');
  return '<div class="chrome">' +
    '<div class="wordmark">' +
      '<div class="wm-badge">'+IC.bolt+'</div>' +
      '<div class="wm-text"><span>Form</span> · Workout Tracker</div>' +
    '</div>' +
    '<div class="ring-row">' +
      ring('week','#E8FF47','r_week','WEEK') +
      ring('day1','#FF3C5C','r_d1','MON') +
      ring('day2','#00E5A0','r_d2','WED') +
      ring('day3','#3D9EFF','r_d3','FRI') +
    '</div>' +
    '<div class="tab-strip">'+tabHTML+'</div>' +
  '</div>';
}

/* ── PAGE ROUTER ── */
function buildPage(){
  if(S.tab==='overview')return buildOverview();
  var day=DAYS.find(function(d){return d.id===S.tab;});
  return day?buildDay(day):'';
}

/* ── OVERVIEW ── */
function buildOverview(){
  var wp=weekProg();
  var dc=doneCount();
  var html='';
  html+='<div class="ov-hero u1"><div class="ov-hero-label">This week</div>';
  html+='<div class="ov-hero-title">3-Day <em>Training</em><br>Programme</div>';
  html+='<div class="ov-hero-sub">Compound strength, resistance bands, and six-pack core development — with integrated nutrition and recovery science.</div></div>';

  html+='<div class="ov-stats u2">';
  html+='<div class="ov-stat"><div class="ov-stat-val" style="color:var(--brand)">'+wp.done+'</div><div class="ov-stat-lbl">Exercises<br>Completed</div></div>';
  html+='<div class="ov-stat"><div class="ov-stat-val" style="color:var(--d2)">'+wp.pct+'%</div><div class="ov-stat-lbl">Week<br>Progress</div></div>';
  html+='<div class="ov-stat"><div class="ov-stat-val" style="color:var(--d3)" id="days-done">'+dc+'/3 days done</div><div class="ov-stat-lbl">Days<br>Done</div></div>';
  html+='</div>';

  html+='<div class="sec-lbl u2">Program Video</div>';
  html+='<div class="ov-video-wrap u3">';
  html+='<a class="ov-yt-card" href="'+ytUrl(OVERVIEW_VID,0)+'" target="_blank" rel="noopener">';
  html+='<div class="ov-yt-thumb"><img src="'+thumb(OVERVIEW_VID)+'" alt="Program Overview" loading="lazy"><div class="ov-yt-grad"><div class="ov-yt-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#ff0000"/></svg></div></div></div>';
  html+='<div class="ov-yt-foot"><div class="ov-yt-title">Program Overview</div><div class="ov-yt-cta">Watch on YouTube'+svgIcon('arrowr')+'</div></div>';
  html+='</a></div>';

  html+='<div class="sec-lbl u3">Weekly Schedule</div>';
  DAYS.forEach(function(day,i){
    var p=dayProg(day);
    var isDone=p.done===p.total&&p.total>0;
    html+='<div class="day-card'+(isDone?' is-done':'')+' u'+(Math.min(i+3,5))+'" id="dc-'+day.id+'" onclick="setTab(\''+day.id+'\')">'+
      '<div class="dc-icon" style="background:'+day.badgeBg+';color:'+day.barColor+'">'+svgIcon(day.iconKey)+'</div>'+
      '<div class="dc-body">'+
        '<div class="dc-day-label">'+day.weekday+'</div>'+
        '<div class="dc-title">'+day.name+' — '+day.type+'</div>'+
        '<div class="dc-meta">'+day.sections.filter(function(s){return s.type==='video';}).length+' sessions · Active recovery included</div>'+
        '<div class="dc-bar-track"><div class="dc-bar-fill" id="bp-'+day.id+'" style="width:'+p.pct+'%;background:'+day.barColor+'"></div></div>'+
      '</div>'+
      '<div class="dc-right">'+
        '<div class="dc-pct" style="color:'+day.barColor+'" id="dpct-'+day.id+'">'+p.pct+'%</div>'+
        '<div class="dc-chevron" style="color:var(--mist)">'+svgIcon('arrowr')+'</div>'+
      '</div>'+
    '</div>';
  });
  html+='<div class="spc"></div>';
  return html;
}

/* ── DAY PAGE ── */
function buildDay(day){
  var p=dayProg(day);
  var html='';
  html+='<div class="day-page-hero u1">'+
    '<div class="day-page-eyebrow">'+day.weekday+'</div>'+
    '<div class="day-page-title" style="color:'+day.barColor+'">'+day.name+'<span style="color:var(--snow)"> — '+day.type+'</span></div>'+
    '<div class="day-page-sub">'+day.sections.filter(function(s){return s.type==='video';}).length+' sessions · '+day.sections.filter(function(s){return s.type==='recovery';}).length+' recovery block</div>'+
    '<div class="day-page-prog"><div class="day-page-fill" id="day-prog-fill" style="width:'+p.pct+'%;background:'+day.barColor+'"></div></div>'+
  '</div>';
  day.sections.forEach(function(s,i){
    html+=s.type==='recovery'?buildRecovery(s,i):buildSessCard(s,i,day);
  });
  html+='<div class="cta-wrap u5"><button class="cta-btn'+(p.pct===100?' done':'')+'" id="cta" onclick="completeDay(\''+day.id+'\')">'+ctaBtnHTML(p.pct===100)+'</button></div>';
  html+='<div class="spc"></div>';
  return html;
}

function ctaBtnHTML(done){
  if(done) return svgIcon('done')+'Day Complete';
  return svgIcon('arrowr')+'Mark Day Complete';
}

/* ── SESSION CARD ── */
function buildSessCard(s,idx,day){
  var isOpen=!!S.open[s.id];
  var exs=s.exercises||[];
  var dc=exs.filter(function(e){return S.done[e.id];}).length;
  var delay='u'+Math.min(idx+2,5);
  var tags=(s.tags||[]).map(function(t){return '<span class="sess-tag">'+t+'</span>';}).join('');
  var doneTag=exs.length>0?'<span class="sess-tag sess-tag-done">'+dc+'/'+exs.length+'</span>':'';
  var html='<div class="sess-card '+delay+'">'+
    '<div class="sess-hdr" onclick="toggleSection(\''+s.id+'\')">'+
      '<div class="sess-icon" style="background:'+s.iconBg+';color:'+s.iconClr+'">'+svgIcon(s.iconKey)+'</div>'+
      '<div class="sess-meta">'+
        '<div class="sess-eyebrow" style="color:'+s.iconClr+'">'+s.eyebrow+'</div>'+
        '<div class="sess-name">'+s.name+'</div>'+
        '<div class="sess-tags">'+tags+doneTag+'</div>'+
      '</div>'+
      '<div class="sess-chevron'+(isOpen?' open':'')+'">'+IC.chevdown+'</div>'+
    '</div>';
  if(isOpen){
    html+='<div class="sess-embed"><div class="embed-shell"><iframe id="ytfr-'+s.videoId+'-'+s.id+'" src="https://www.youtube.com/embed/'+s.videoId+'?enablejsapi=1&rel=0&modestbranding=1&playsinline=1" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div></div>';
    if(exs.length>0){
      html+='<div class="ex-block"><div class="ex-block-lbl">Exercises &amp; Timestamps</div>';
      exs.forEach(function(e){html+=buildEx(e,s);});
      html+='</div>';
    }
  }
  return html+'</div>';
}

/* ── EXERCISE ROW ── */
function buildEx(e,s){
  var done=!!S.done[e.id];
  var watchHTML='<div class="ts-list" onclick="event.stopPropagation()">'+
    '<a class="ts-chip" href="'+ytUrl(s.videoId,0)+'" target="_blank" rel="noopener">'+
      '<svg viewBox="0 0 12 12">'+IC.play+'</svg>'+
      'Watch in video'+
    '</a>'+
  '</div>';
  return '<div class="ex-row'+(done?' ck':'')+'" id="i-'+e.id+'" onclick="toggleItem(\''+(e.id)+'\')">'+
    '<div class="ex-cb"><div class="ex-cb-icon" style="opacity:'+(done?1:0)+'">'+IC.check+'</div></div>'+
    '<div class="ex-right">'+
      '<div class="ex-name" style="text-decoration:'+(done?'line-through':'none')+'">'+e.name+'</div>'+
      '<div class="ex-detail">'+e.detail+'</div>'+
      watchHTML+
    '</div>'+
  '</div>';
}

/* ── RECOVERY ── */
function buildRecovery(s,idx){
  var delay='u'+Math.min(idx+2,5);
  var html='<div class="rec-card '+delay+'">'+
    '<div class="rec-hdr"><div class="rec-hdr-icon" style="color:var(--d2)">'+svgIcon('recover')+'</div><div class="rec-hdr-text">'+s.name+'</div></div>';
  s.items.forEach(function(r){
    var done=!!S.done[r.id];
    html+='<div class="rec-row'+(done?' ck':'')+'" id="i-'+r.id+'" onclick="toggleItem(\''+r.id+'\')">'+
      '<div class="rec-cb"><div class="rec-cb-icon" style="opacity:'+(done?1:0)+'">'+IC.check+'</div></div>'+
      '<div class="rec-txt" style="text-decoration:'+(done?'line-through':'none')+'">'+r.txt+'</div>'+
      '<div class="rec-badge">'+r.badge+'</div>'+
    '</div>';
  });
  return html+'</div>';
}

/* ── BOTTOM NAV ── */
function buildNav(){
  var items=[
    {id:'overview',key:'grid',lbl:'Plan'},
    {id:'day1',key:'day1icon',lbl:'Day 1'},
    {id:'day2',key:'day2icon',lbl:'Day 2'},
    {id:'day3',key:'day3icon',lbl:'Day 3'}
  ];
  document.getElementById('nav').innerHTML=items.map(function(t){
    var cls='nav-item';
    if(S.tab===t.id)cls+=(t.id==='day1'?' on-d1':t.id==='day2'?' on-d2':t.id==='day3'?' on-d3':' on');
    return '<button class="'+cls+'" onclick="setTab(\''+t.id+'\')">'+
      '<div class="nav-item-icon">'+svgIcon(t.key)+'</div>'+
      '<div class="nav-item-lbl">'+t.lbl+'</div>'+
      '<div class="nav-pip"></div>'+
    '</button>';
  }).join('');
}

/* ══════════════════════════════════════════
   YOUTUBE PLAYER API
══════════════════════════════════════════ */
var YTP={};
window.onYouTubeIframeAPIReady=function(){
  document.querySelectorAll('iframe[id^="ytfr-"]').forEach(function(fr){initYT(fr.id);});
};
function initYT(fid){
  if(YTP[fid]||!window.YT)return;
  YTP[fid]=new YT.Player(fid,{});
}
function seekYT(sectionId,videoId,sec,evt){
  if(evt)evt.stopPropagation();
  var fid='ytfr-'+videoId+'-'+sectionId;
  var p=YTP[fid];
  if(p&&typeof p.seekTo==='function'){p.seekTo(sec,true);p.playVideo();}
  else {
    var fr=document.getElementById(fid);
    if(fr){fr.src='https://www.youtube.com/embed/'+videoId+'?start='+sec+'&autoplay=1&enablejsapi=1&rel=0&modestbranding=1&playsinline=1';
    setTimeout(function(){initYT(fid);},600);}
  }
}
(function(){var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);})();

render();
</script>
